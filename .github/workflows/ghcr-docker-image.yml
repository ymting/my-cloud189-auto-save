name: Build and Push to GHCR

# 允许手动触发工作流，也可以配置当推送到 main 分支时自动触发
on:
  workflow_dispatch:
    inputs:
      version:
        description: '输入要构建的镜像版本号 (例如: 1.0.0)，留空则自动从 package.json 读取'
        required: false
        default: ''
  # 取消下方注释可以实现在 push 代码到 main 分支时自动构建并推送镜像
  push:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 从 package.json 读取版本号
        id: pkg_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: 确定最终构建版本号
        id: final_version
        run: |
          # 手动触发且填了版本号则用手动输入的，否则读 package.json
          INPUT_VERSION="${{ github.event.inputs.version }}"
          PKG_VERSION="${{ steps.pkg_version.outputs.version }}"
          FINAL="${INPUT_VERSION:-$PKG_VERSION}"
          echo "version=$FINAL" >> $GITHUB_OUTPUT
          echo "将使用版本号: $FINAL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 如需支持 arm64，请取消下方注释（构建速度会变慢）
          # platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.final_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
